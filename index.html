<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta untuk Web App -->
    <meta name="theme-color" content="#002211">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shanted Phoen - CORE v5.5 Platinum</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* --- VARIABEL TEMA DINAMIS --- */
        :root {
            --bg-img: url('https://images.unsplash.com/photo-1448375240586-882707db888b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1080&q=80');
            --bg-overlay: linear-gradient(rgba(2, 10, 5, 0.8), rgba(2, 15, 10, 0.95));
            --primary-color: #00ff41; 
            --secondary-color: #08f7fe; 
            --alert-red: #ff003c;
            --bubble-bg: rgba(5, 20, 10, 0.75);
            --ear-bg: rgba(5, 20, 10, 0.95);
            --text-main: var(--primary-color);
            --text-muted: #a0c4a8;
            --header-bg: rgba(0, 20, 10, 0.85);
            --footer-bg: rgba(2, 10, 5, 0.95);
            --shadow-glow: 0 0 15px rgba(0, 255, 65, 0.2);
            --crt-opacity: 0.5;
        }

        /* --- MODE TERANG (LIGHT MODE) TAMPILAN JELAS --- */
        body.light-mode {
            /* Overlay dibuat transparan agar gambar latar belakang terlihat 100% jelas tanpa efek keputihan/gelap */
            --bg-overlay: transparent !important; 
            
            /* Warna elemen lain tetap terang agar teks mudah dibaca */
            --bubble-bg: rgba(255, 255, 255, 0.95);
            --ear-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.95);
            --footer-bg: rgba(250, 252, 255, 0.98);
            --text-main: #111111;
            --text-muted: #666666;
            --crt-opacity: 0; /* Efek garis CRT dihilangkan total */
            --shadow-glow: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Share Tech Mono', monospace; }
        
        body { 
            background: var(--bg-overlay), var(--bg-img) center/cover no-repeat fixed;
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; transition: background 0.4s ease;
        }

        /* Efek CRT Scanline */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 999; background-size: 100% 3px; pointer-events: none; opacity: var(--crt-opacity); transition: opacity 0.4s;
        }

        /* --- Header --- */
        header { 
            background-color: var(--header-bg); color: var(--primary-color); padding: 15px 20px; font-size: 18px; font-weight: bold; 
            border-bottom: 2px solid var(--primary-color); display: flex; justify-content: space-between; align-items: center; 
            flex-shrink: 0; z-index: 10; text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(8px); transition: 0.3s;
        }
        .sys-status { font-size: 12px; color: var(--secondary-color); animation: blink 2s infinite; display: block; margin-bottom: 5px; text-align: right;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .header-buttons { display: flex; gap: 8px; align-items: center; }
        .btn-action { background: transparent; border: 1px solid var(--primary-color); padding: 6px 12px; font-size: 14px; cursor: pointer; color: var(--primary-color); border-radius: 5px; font-weight: bold; box-shadow: 0 0 5px var(--shadow-glow); transition: 0.2s; }
        .btn-action:active { background: var(--primary-color); color: #000; }

        /* --- Area Data --- */
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; display: flex; flex-direction: column; }
        
        @keyframes saltoBerkala {
            0%   { transform: perspective(600px) rotateX(0deg); }
            4%   { transform: perspective(600px) rotateX(-180deg) scale(0.9); }
            8%   { transform: perspective(600px) rotateX(-360deg) scale(1); }
            100% { transform: perspective(600px) rotateX(-360deg); }
        }
        @keyframes kesetrum {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px) rotate(-1deg); }
            50% { transform: translateX(3px) rotate(1deg); }
            75% { transform: translateX(-3px) rotate(-1deg); }
            100% { transform: translateX(0); }
        }

        /* --- BUBBLE DASAR --- */
        .bubble { 
            background-color: var(--bubble-bg); border: 2px solid var(--primary-color); box-shadow: var(--shadow-glow);
            padding: 20px 15px 15px 15px; margin-top: 20px; margin-bottom: 15px; max-width: 85%; 
            font-size: 15px; position: relative; display: flex; flex-direction: column; gap: 5px; cursor: pointer; 
            transform-style: preserve-3d; backdrop-filter: blur(4px); transition: 0.3s;
        }
        .ear {
            position: absolute; background-color: var(--ear-bg);
            border-top: 2px solid var(--primary-color); border-left: 2px solid var(--primary-color);
            z-index: -1; transition: 0.3s;
        }
        .bubble-left { align-self: flex-start; }
        .bubble-right { align-self: flex-end; border-color: var(--secondary-color); text-align: right; }
        .bubble-right .ear { border-color: var(--secondary-color); }
        .bubble:active { animation: kesetrum 0.2s infinite !important; opacity: 0.8; }

        /* --- 15 VARIASI BENTUK DATA --- */
        /* 1. Kucing (Default) */
        .bentuk-kucing .bubble { border-radius: 15px 15px 35px 35px; }
        .bentuk-kucing .ear { top: -12px; width: 24px; height: 24px; transform: rotate(45deg); }
        .bentuk-kucing .ear-left { left: 20px; } .bentuk-kucing .ear-right { right: 20px; }

        /* 2. Beruang */
        .bentuk-beruang .bubble { border-radius: 25px; }
        .bentuk-beruang .ear { top: -15px; width: 32px; height: 32px; border-radius: 50%; transform: none; border: 2px solid var(--primary-color) !important; }
        .bentuk-beruang .bubble-right .ear { border-color: var(--secondary-color) !important; }
        .bentuk-beruang .ear-left { left: 15px; } .bentuk-beruang .ear-right { right: 15px; }

        /* 3. Kelinci */
        .bentuk-kelinci .bubble { border-radius: 20px 20px 40px 40px; }
        .bentuk-kelinci .ear { top: -35px; width: 20px; height: 45px; border-radius: 50% 50% 0 0; transform: none; border: 2px solid var(--primary-color) !important; border-bottom: none !important;}
        .bentuk-kelinci .bubble-right .ear { border-color: var(--secondary-color) !important; }
        .bentuk-kelinci .ear-left { left: 25px; } .bentuk-kelinci .ear-right { right: 25px; }

        /* 4. Robot Cyber */
        .bentuk-robot .bubble { border-radius: 0; box-shadow: 6px 6px 0 var(--secondary-color); }
        .bentuk-robot .ear { display: none; }

        /* 5. Kapsul */
        .bentuk-kapsul .bubble { border-radius: 50px; padding: 20px 30px; }
        .bentuk-kapsul .ear { display: none; }

        /* 6. Anjing (Telinga Turun) */
        .bentuk-anjing .bubble { border-radius: 20px 20px 10px 10px; }
        .bentuk-anjing .ear { top: 10px; width: 20px; height: 40px; border-radius: 0 0 50px 50px; border: 2px solid var(--primary-color) !important; border-top: none !important;}
        .bentuk-anjing .bubble-right .ear { border-color: var(--secondary-color) !important; }
        .bentuk-anjing .ear-left { left: -10px; } .bentuk-anjing .ear-right { right: -10px; }

        /* 7. Rubah */
        .bentuk-rubah .bubble { border-radius: 10px 10px 40px 40px; }
        .bentuk-rubah .ear { top: -15px; width: 30px; height: 30px; transform: rotate(45deg) skew(15deg, 15deg); }
        .bentuk-rubah .ear-left { left: 15px; } .bentuk-rubah .ear-right { right: 15px; }

        /* 8. Kelelawar */
        .bentuk-kelelawar .bubble { border-radius: 5px 5px 30px 30px; border-bottom: 4px solid var(--secondary-color); }
        .bentuk-kelelawar .ear { top: -10px; width: 40px; height: 25px; border-radius: 50% 50% 0 0; border: 2px solid var(--primary-color) !important; }
        .bentuk-kelelawar .bubble-right .ear { border-color: var(--secondary-color) !important; }
        .bentuk-kelelawar .ear-left { left: 10px; transform: rotate(-20deg); } .bentuk-kelelawar .ear-right { right: 10px; transform: rotate(20deg); }

        /* 9. Tanduk Iblis */
        .bentuk-tanduk .bubble { border-radius: 15px; }
        .bentuk-tanduk .ear { top: -20px; width: 15px; height: 30px; border-radius: 50% 0 50% 0; border: 2px solid var(--primary-color) !important; }
        .bentuk-tanduk .bubble-right .ear { border-color: var(--secondary-color) !important; }
        .bentuk-tanduk .ear-left { left: 20px; transform: rotate(-15deg); } .bentuk-tanduk .ear-right { right: 20px; transform: rotate(15deg) scaleX(-1); }

        /* 10. Awan */
        .bentuk-awan .bubble { border-radius: 40px; }
        .bentuk-awan .ear { display: none; }

        /* 11. Perisai */
        .bentuk-perisai .bubble { border-radius: 5px 5px 50px 50px; }
        .bentuk-perisai .ear { display: none; }

        /* 12. Daun / Mata */
        .bentuk-daun .bubble { border-radius: 0 40px 0 40px; }
        .bentuk-daun .bubble-right { border-radius: 40px 0 40px 0; }
        .bentuk-daun .ear { display: none; }

        /* 13. Hexagon Minimalis */
        .bentuk-heksagon .bubble { clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%); border-radius: 0; padding: 25px; }
        .bentuk-heksagon .ear { display: none; }

        /* 14. TV Tabung */
        .bentuk-tv .bubble { border-radius: 30px / 15px; border-width: 4px; }
        .bentuk-tv .ear { top: -15px; width: 4px; height: 25px; background: var(--primary-color); border: none; }
        .bentuk-tv .bubble-right .ear { background: var(--secondary-color); }
        .bentuk-tv .ear-left { left: 40%; transform: rotate(-30deg); } .bentuk-tv .ear-right { right: 40%; transform: rotate(30deg); }

        /* 15. Gulungan Kertas (Scroll) */
        .bentuk-scroll .bubble { border-radius: 0; border-left: 10px solid var(--secondary-color); border-right: 10px solid var(--secondary-color); }
        .bentuk-scroll .ear { display: none; }


        .bubble .info { font-size: 12px; color: var(--text-muted); }
        .bubble .attachment-info { font-size: 12px; color: var(--secondary-color); font-weight: bold; }
        
        .btn-delete { 
            background: transparent; color: var(--alert-red); border: 1px solid var(--alert-red); 
            padding: 5px 10px; font-size: 12px; cursor: pointer; margin-top: 8px; font-weight: bold; align-self: flex-start; z-index: 2; border-radius: 5px; transition: 0.2s;
        }
        .bubble-right .btn-delete { align-self: flex-end; }
        .btn-delete:active { background: var(--alert-red); color: #fff; }

        /* --- Bottom Bar --- */
        footer { 
            position: fixed; bottom: 0; width: 100%; background-color: var(--footer-bg); padding: 10px 15px; 
            display: flex; align-items: center; gap: 10px; border-top: 2px solid var(--primary-color); z-index: 10; backdrop-filter: blur(8px); transition: 0.3s;
        }
        .btn-add { background-color: transparent; color: var(--secondary-color); border: 2px solid var(--secondary-color); width: 45px; height: 45px; font-size: 24px; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .btn-add:active { background: var(--secondary-color); color: #000; }
        .fake-input { flex: 1; background: transparent; padding: 12px 15px; border: 1px solid var(--primary-color); color: var(--text-main); font-size: 15px; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        body.light-mode .fake-input { background: #fff; }

        /* --- Modal Umum --- */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--footer-bg); z-index: 100; flex-direction: column; 
            animation: slideUp 0.3s ease-out; backdrop-filter: blur(10px); color: var(--text-main);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { 
            background-color: var(--header-bg); color: var(--secondary-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            font-size: 18px; font-weight: bold; border-bottom: 2px solid var(--secondary-color); text-transform: uppercase;
        }
        .btn-close { background: none; border: none; color: var(--alert-red); cursor: pointer; font-size: 24px;}
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; color: var(--primary-color); margin-bottom: 5px; text-transform: uppercase; font-weight: bold;}
        .input-group input, .input-group select { 
            width: 100%; background: transparent; border: 1px solid #ccc; border-bottom: 2px solid var(--primary-color); 
            padding: 10px; font-size: 16px; color: var(--text-main); outline: none; transition: 0.3s;
        }
        .input-group input:focus, .input-group select:focus { border-bottom: 2px solid var(--secondary-color); background: rgba(0,0,0,0.05); }
        .input-group option { background-color: #111; color: #fff; }
        
        .file-input { border: none !important; margin-top: 5px; font-size: 13px; color: var(--primary-color); }
        .file-input::file-selector-button { background-color: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 8px 12px; cursor: pointer; margin-right: 10px; text-transform: uppercase; border-radius: 5px; font-weight: bold; }

        .btn-submit { 
            background-color: transparent; color: var(--secondary-color); border: 2px solid var(--secondary-color); width: 100%; padding: 15px; 
            font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; border-radius: 10px; transition: 0.2s;
        }
        .btn-submit:active { background: var(--secondary-color); color: #000; }

        .detail-item { border-left: 2px solid var(--secondary-color); padding-left: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 0 10px 10px 0; }
        .detail-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 2px; font-weight: bold;}
        .detail-value { font-size: 16px; font-weight: bold;}
        .detail-img { max-width: 100%; border: 1px solid var(--secondary-color); margin-top: 10px; border-radius: 10px; }
        
        .loading-nuclear { border-color: var(--alert-red) !important; color: var(--alert-red) !important; animation: nuclearPulse 0.5s infinite; }
        @keyframes nuclearPulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div>
            <span>SHANTED PHOEN <br><small style="font-size: 10px; color: var(--text-muted);">CORE v5.5 PLATINUM</small></span>
        </div>
        <div>
            <span class="sys-status">[ ONLINE ]</span>
            <div class="header-buttons">
                <!-- Tombol Mode Terang/Gelap -->
                <button class="btn-action" onclick="toggleLightMode()" title="Mode Terang / Gelap">🌓</button>

    <!-- MODAL SETTING (KOMPREHENSIF) -->
    <div id="setting-modal" class="modal-overlay">
        <div class="modal-header">

            <button class="btn-close" onclick="tutupSetting()">[X]</button>

        <div class="modal-body">
            
            <div class="input-group">

    <!-- MODAL FORM INPUT -->
    <div id="form-modal" class="modal-overlay">
        <div class="modal-header">
            <span>> ISI DATA BARU KI'</span>

        <div class="modal-header">
            <span>> CEK DETAILNYA</span>
            <button class="btn-close" onclick="tutupDetail()">[X]</button>
        </div>
        <div class="modal-body" id="detail-body"></div>
    </div>

    <script>
        const API_URL = "http://20.219.4.22:3080/api/reinput";
        let globalData = []; 
        const rootVars = document.documentElement.style;

        // --- SISTEM MODE TERANG / GELAP ---
        function toggleLightMode() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('shanted_lightmode', isLight);
            
            // Ubah warna meta theme untuk PWA mobile
            document.querySelector('meta[name="theme-color"]').setAttribute("content", isLight ? "#ffffff" : "#002211");
        }

        // --- SISTEM SETTING TEMA, BENTUK & BACKGROUND ---
        function bukaSetting() { document.getElementById('setting-modal').style.display = 'flex'; }
        function tutupSetting() { document.getElementById('setting-modal').style.display = 'none'; }

        // Peta Konfigurasi Warna [Primary, Secondary]
        const mapWarna = {
            hijau: ['#00ff41', '#08f7fe'], biru: ['#08f7fe', '#00ff41'],
            merah: ['#ff003c', '#ffb300'], ungu: ['#bc13fe', '#08f7fe'],
            kuning: ['#ffd700', '#ff8c00'], putih: ['#ffffff', '#aaaaaa'],
            oranye: ['#ff5e00', '#ffcc00'], pink: ['#ff007f', '#ff66b2'],
            cyan_muda: ['#a0ffff', '#ffffff'], hijau_lime: ['#ccff00', '#00ff00'],
            emas_gelap: ['#b8860b', '#ffd700'], magenta: ['#8b008b', '#ff00ff'],
            merah_darah: ['#dc143c', '#ff4500'], biru_laut: ['#00bfff', '#1e90ff'],
            kuning_neon: ['#e6fb04', '#ff1493'], hijau_zamrud: ['#50c878', '#00fa9a']
        };

        // Peta Konfigurasi URL Latar Belakang
        const mapBg = {

        function terapkanSetting() {
            const bentuk = document.getElementById('pilih-bentuk').value;
            const warna = document.getElementById('pilih-warna').value;
            const bg = document.getElementById('pilih-bg').value;

            // Terapkan Bentuk
            document.getElementById('chat-container').className = 'bentuk-' + bentuk;

            // Terapkan Warna
            if(mapWarna[warna]) {
                rootVars.setProperty('--primary-color', mapWarna[warna][0]);
                rootVars.setProperty('--secondary-color', mapWarna[warna][1]);
                rootVars.setProperty('--text-main', 'var(--primary-color)');
            }

            // Terapkan Latar Belakang
            if(mapBg[bg] !== undefined) {
                rootVars.setProperty('--bg-img', mapBg[bg]);
                // Setting overlay dikembalikan ke default untuk mode gelap, karena kalau di mode terang dia akan di-override otomatis oleh class .light-mode di CSS
                if(bg === 'gelap') {
                    rootVars.setProperty('--bg-overlay', "#0a0a0a");
                } else {
                    rootVars.setProperty('--bg-overlay', "linear-gradient(rgba(2, 10, 5, 0.8), rgba(2, 15, 10, 0.95))");
                }
            }

            // Simpan memori
            localStorage.setItem('shanted_bentuk', bentuk);
            localStorage.setItem('shanted_warna', warna);
            localStorage.setItem('shanted_bg', bg);
        }

        function muatSetting() {
            // Mode Terang / Gelap
            const isLight = localStorage.getItem('shanted_lightmode') === 'true';
            if(isLight) {
                document.body.classList.add('light-mode');
                document.querySelector('meta[name="theme-color"]').setAttribute("content", "#ffffff");
            }

            // Preferensi Detail
            const savedBentuk = localStorage.getItem('shanted_bentuk') || 'kucing';
            const savedWarna = localStorage.getItem('shanted_warna') || 'hijau';
            const savedBg = localStorage.getItem('shanted_bg') || 'hutan';
            
            document.getElementById('pilih-bentuk').value = savedBentuk;
            document.getElementById('pilih-warna').value = savedWarna;
            document.getElementById('pilih-bg').value = savedBg;
            terapkanSetting();
        }

        // --- SISTEM MODAL & KONVERSI ---
        function openModal() { document.getElementById('form-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('form-modal').style.display = 'none'; document.getElementById('dataForm').reset(); }
        function tutupDetail() { document.getElementById('detail-modal').style.display = 'none'; }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (event) => {
                if (!file.type.startsWith('image/')) { resolve(event.target.result); return; }
                const img = new Image(); img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; let scaleSize = 1;
                    if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                    canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.onerror = error => reject(error);
            };
            reader.onerror = error => reject(error);
        });

        // --- FETCH API DATA ---
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                globalData = data; 
                const container = document.getElementById('chat-container');
                container.innerHTML = ''; 

                if(data.length === 0) {
                    container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:50px; font-style:italic; background: var(--bubble-bg); padding: 10px; border-radius: 10px; backdrop-filter: blur(5px);">> Tena data tersimpan...</div>`;
                }

                data.forEach((item, index) => {
                    const isRight = index % 2 !== 0; 
                    const bubbleClass = isRight ? 'bubble-right' : 'bubble-left';
                    const lampiranHTML = (item.lampiran && item.lampiran.length > 0) ? `<span class="attachment-info">> [ ${item.lampiran.length} FILE TERLAMPIR ]</span>` : '';
                    const animationDelay = index * 1.5;

                    container.innerHTML += `
                        <div class="bubble ${bubbleClass}" style="animation: saltoBerkala 10s infinite ${animationDelay}s;" onclick="bukaDetail('${item.id}')">
                            <div class="ear ear-left"></div>
                            <div class="ear ear-right"></div>
                            <strong>${item.nama}</strong>
                            <span class="info">Tgl Beli: ${item.tglBeli || 'Tena'}</span>
                            ${lampiranHTML}
                            <button class="btn-delete" onclick="hapusData(event, '${item.id}')">[ KASIH HAPUS ]</button>
                        </div>
                    `;
                });
            } catch (error) { console.error("Gagal konek ki bos:", error); }
        }

        function bukaDetail(id) {
            const item = globalData.find(d => d.id === id);
            if(!item) return;

            let htmlDetail = `
                <div class="detail-item"><span class="detail-label">NAMA PELANGGANTA'</span><span class="detail-value" style="color:var(--primary-color);">${item.nama}</span></div>
                <div class="detail-item"><span class="detail-label">ALAMAT LENGKAPNA</span><span class="detail-value" style="color:var(--primary-color);">${item.alamat || 'Tena diisi'}</span></div>
                <div class="detail-item"><span class="detail-label">NOMOR HP/WA-NA</span><span class="detail-value" style="color:var(--primary-color);">${item.nohp || 'Tena diisi'}</span></div>
                <div class="detail-item"><span class="detail-label">MODEL BARANGNA</span><span class="detail-value" style="color:var(--primary-color);">${item.model || 'Tena diisi'}</span></div>
                <div class="detail-item"><span class="detail-label">TANGGAL BELINA</span><span class="detail-value" style="color:var(--primary-color);">${item.tglBeli || 'Tena diisi'}</span></div>
            `;

            if(item.waktuPengingat) {
                const waktuLokal = new Date(item.waktuPengingat).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                htmlDetail += `<div class="detail-item"><span class="detail-label">JADWAL ALARM</span><span class="detail-value" style="color:var(--primary-color);">${waktuLokal} WITA</span></div>`;
            }

            if(item.lampiran && item.lampiran.length > 0) {
                htmlDetail += `<div class="detail-item"><span class="detail-label">LAMPIRANG FOTO/FILE</span>`;
                item.lampiran.forEach(file => { htmlDetail += `<img src="${file.data}" class="detail-img">`; });
                htmlDetail += `</div>`;
            }

            document.getElementById('detail-body').innerHTML = htmlDetail;
            document.getElementById('detail-modal').style.display = 'flex';
        }

        async function simpanData(e) {
            e.preventDefault();
            const tombolSimpan = document.querySelector('.btn-submit');
            tombolSimpan.innerText = '> TUNGGU MAKI, MENYIMPAN...';
            tombolSimpan.classList.add('loading-nuclear'); tombolSimpan.disabled = true;

            try {
                const fileInput = document.getElementById('lampiran');
                let arrayLampiran = [];
                if (fileInput.files.length > 0) {
                    for (let i = 0; i < fileInput.files.length; i++) {
                        const base64Data = await toBase64(fileInput.files[i]);
                        arrayLampiran.push({ namaFile: fileInput.files[i].name, data: base64Data });
                    }
                }
                const inputWaktu = document.getElementById('waktu').value;
                let waktuAbsolut = inputWaktu ? new Date(inputWaktu).toISOString() : "";
                const newData = {
                    id: Date.now().toString(),
                    nama: document.getElementById('nama').value,
                    alamat: document.getElementById('alamat').value,
                    nohp: document.getElementById('nohp').value,
                    model: document.getElementById('model').value,
                    tglBeli: document.getElementById('tglbeli').value,
                    waktuPengingat: waktuAbsolut,
                    lampiran: arrayLampiran,
                    notified: false
                };
                await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newData) });
                closeModal(); loadData(); 
            } catch (error) { 
                alert("Gagal konek ke server bosku! Cek ki internet ta'."); 
            } finally { 
                tombolSimpan.innerText = "> SIMPAN KI' DATANYA"; 
                tombolSimpan.classList.remove('loading-nuclear'); tombolSimpan.disabled = false; 
            }
        }

        async function hapusData(event, id) {
            event.stopPropagation(); 
            if(confirm("Yakin ki' mau kasih hapus permanen ini data bosku?")) {
                await fetch(API_URL + '/' + id, { method: 'DELETE' }); loadData(); 
            }
        }

        window.onload = () => { muatSetting(); loadData(); }
    </script>
